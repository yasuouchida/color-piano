<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>平均律と可視光の対応ピアノ</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --panel: #ffffff;
      --text: #1d2329;
      --muted: #5a6673;
      --border: #d7dde3;
      --shadow: 0 8px 24px rgba(0,0,0,.08);
      --white-w: 86px;
      --white-h: 260px;
      --black-w: 52px;
      --black-h: 155px;
      --keyboard-w: 688px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans", "Yu Gothic", sans-serif;
      background: linear-gradient(180deg, #f8fafc 0%, #eef3f7 100%);
      color: var(--text);
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 20px;
    }

    h1 {
      font-size: 1.8rem;
      margin: 0 0 8px;
    }

    .lead {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.6;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1.4fr .9fr;
      gap: 16px;
      margin-bottom: 18px;
    }

    .panel {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      background: #fbfcfd;
      min-height: 118px;
    }

    .panel h2 {
      font-size: 1rem;
      margin: 0 0 10px;
    }

    #info {
      line-height: 1.7;
      font-size: 0.97rem;
    }

    .swatch {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 1px solid #333;
      vertical-align: -3px;
      border-radius: 4px;
      margin: 0 4px;
    }

    .hint {
      color: var(--muted);
      font-size: .92rem;
      line-height: 1.6;
    }

    .keyboard-shell {
      overflow-x: auto;
      padding-bottom: 6px;
    }

    .keyboard-frame {
      width: calc(var(--keyboard-w) + 24px);
      background: linear-gradient(180deg, #3f4750 0%, #242a31 100%);
      padding: 12px;
      border-radius: 16px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.1), 0 8px 20px rgba(0,0,0,.16);
      margin: 0 auto;
    }

    .keyboard {
      position: relative;
      width: var(--keyboard-w);
      height: var(--white-h);
      background: #101418;
      border-radius: 0 0 12px 12px;
      overflow: hidden;
    }

    .white-key,
    .black-key {
      position: absolute;
      top: 0;
      border: 1.5px solid #1a1a1a;
      cursor: pointer;
      user-select: none;
      transition: transform .06s ease, filter .08s ease, box-shadow .08s ease;
      display: block;
    }

    .white-key {
      width: var(--white-w);
      height: var(--white-h);
      z-index: 1;
      border-radius: 0 0 9px 9px;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.45),
        inset 0 -12px 0 rgba(0,0,0,.10);
    }

    .black-key {
      width: var(--black-w);
      height: var(--black-h);
      z-index: 10;
      border-radius: 0 0 7px 7px;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.20),
        inset 0 -10px 0 rgba(0,0,0,.28),
        0 4px 8px rgba(0,0,0,.38);
    }

    .white-key:active,
    .white-key.active {
      transform: translateY(3px);
      filter: brightness(.96);
    }

    .black-key:active,
    .black-key.active {
      transform: translateY(3px);
      filter: brightness(.94);
    }

    .key-label {
      position: absolute;
      left: 0;
      width: 100%;
      text-align: center;
      font-weight: 700;
      text-shadow: 0 1px 0 rgba(0,0,0,.12);
      pointer-events: none;
    }

    .white-key .key-label {
      bottom: 14px;
      font-size: 0.98rem;
      line-height: 1.3;
    }

    .black-key .key-label {
      bottom: 12px;
      font-size: 0.8rem;
      line-height: 1.2;
    }

    .sub {
      font-size: .74em;
      font-weight: 600;
      opacity: .95;
    }

    .footer {
      margin-top: 16px;
      color: var(--muted);
      font-size: .9rem;
      line-height: 1.6;
    }

    @media (max-width: 760px) {
      body { padding: 14px; }
      .topbar { grid-template-columns: 1fr; }
      h1 { font-size: 1.45rem; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>平均律と可視光の対応ピアノ</h1>
      <p class="lead">
        可視光の波長範囲を 760nm ～ 380nm とし、1オクターブの 12平均律に対応づけた色つきピアノです。
        鍵盤をクリックすると対応する音が鳴ります。
      </p>

      <div class="topbar">
        <div class="panel">
          <h2>選択中の鍵</h2>
          <div id="info">鍵盤をクリックしてください。</div>
        </div>
        <div class="panel">
          <h2>操作</h2>
          <div class="hint">
            ・白鍵と黒鍵はピアノらしい前後関係で配置しています。<br>
            ・PCではキーボード操作にも対応しています。<br>
            <span class="sub">白鍵: A S D F G H J K / 黒鍵: W E T Y U</span>
          </div>
        </div>
      </div>

      <div class="keyboard-shell">
        <div class="keyboard-frame">
          <div id="keyboard" class="keyboard" aria-label="colored piano keyboard"></div>
        </div>
      </div>

      <div class="footer">
        対応: C4 = 261.63Hz を基準に 12平均律で C5 まで。<br>
        色は 760nm → 380nm を 1オクターブに対応させています。
      </div>
    </div>
  </div>

  <script>
    const noteNames = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B", "C5"];
    const whiteOrder = ["C", "D", "E", "F", "G", "A", "B", "C5"];
    const blackOrder = ["C#", "D#", "F#", "G#", "A#"];
    const keyMap = {
      "a": "C",  "w": "C#", "s": "D",  "e": "D#", "d": "E",
      "f": "F",  "t": "F#", "g": "G",  "y": "G#", "h": "A",
      "u": "A#", "j": "B",  "k": "C5"
    };

    const WHITE_W = 86;
    const BLACK_W = 52;
    const BLACK_H = 155;

    const whiteLeft = {
      C: 0, D: 86, E: 172, F: 258, G: 344, A: 430, B: 516, C5: 602
    };

    const blackLeft = {
      "C#": 86 - BLACK_W / 2,
      "D#": 172 - BLACK_W / 2,
      "F#": 344 - BLACK_W / 2,
      "G#": 430 - BLACK_W / 2,
      "A#": 516 - BLACK_W / 2
    };

    function wavelengthToRgb(wavelength, gamma = 0.8) {
      let r = 0, g = 0, b = 0;
      const w = Number(wavelength);
      if (w < 380 || w > 760) return [0, 0, 0];

      if (w < 440) {
        const a = 0.3 + 0.7 * (w - 380) / (440 - 380);
        r = Math.pow((-(w - 440) / (440 - 380)) * a, gamma);
        b = Math.pow(1.0 * a, gamma);
      } else if (w < 490) {
        g = Math.pow((w - 440) / (490 - 440), gamma);
        b = 1.0;
      } else if (w < 510) {
        g = 1.0;
        b = Math.pow((-(w - 510) / (510 - 490)), gamma);
      } else if (w < 580) {
        r = Math.pow((w - 510) / (580 - 510), gamma);
        g = 1.0;
      } else if (w < 645) {
        r = 1.0;
        g = Math.pow((-(w - 645) / (645 - 580)), gamma);
      } else {
        const a = 0.3 + 0.7 * (760 - w) / (760 - 645);
        r = Math.pow(1.0 * a, gamma);
      }

      return [r, g, b].map(v => Math.max(0, Math.min(255, Math.round(v * 255))));
    }

    function rgbToHex([r, g, b]) {
      return '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join('');
    }

    function textColor(hex) {
      const c = hex.replace('#', '');
      const r = parseInt(c.slice(0,2), 16);
      const g = parseInt(c.slice(2,4), 16);
      const b = parseInt(c.slice(4,6), 16);
      const brightness = 0.299 * r + 0.587 * g + 0.114 * b;
      return brightness > 145 ? '#111' : '#fff';
    }

    const baseFreq = 261.63;
    const lambdaMax = 760.0;

    const notes = noteNames.map((name, i) => {
      const freq = baseFreq * Math.pow(2, i / 12);
      const wl = lambdaMax / Math.pow(2, i / 12);
      const color = rgbToHex(wavelengthToRgb(wl));
      return { name, freq, wavelength: wl, color };
    });

    const noteMap = Object.fromEntries(notes.map(n => [n.name, n]));
    const keyboard = document.getElementById('keyboard');
    const info = document.getElementById('info');

    let audioCtx = null;
    function getAudioContext() {
      if (!audioCtx) {
        const Ctx = window.AudioContext || window.webkitAudioContext;
        audioCtx = new Ctx();
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    }

    function showInfo(n) {
      info.innerHTML =
        `<strong>${n.name}</strong><br>` +
        `周波数: ${n.freq.toFixed(2)} Hz<br>` +
        `波長: ${n.wavelength.toFixed(1)} nm<br>` +
        `色: <span class="swatch" style="background:${n.color}"></span> ${n.color}`;
    }

    function playTone(freq) {
      const ctx = getAudioContext();
      const now = ctx.currentTime;
      const duration = 0.85;

      const osc1 = ctx.createOscillator();
      const osc2 = ctx.createOscillator();
      const osc3 = ctx.createOscillator();
      const gain = ctx.createGain();
      const g1 = ctx.createGain();
      const g2 = ctx.createGain();
      const g3 = ctx.createGain();

      osc1.type = 'sine';
      osc2.type = 'sine';
      osc3.type = 'sine';
      osc1.frequency.value = freq;
      osc2.frequency.value = freq * 2;
      osc3.frequency.value = freq * 3;

      g1.gain.value = 0.22;
      g2.gain.value = 0.07;
      g3.gain.value = 0.03;

      osc1.connect(g1); osc2.connect(g2); osc3.connect(g3);
      g1.connect(gain); g2.connect(gain); g3.connect(gain);
      gain.connect(ctx.destination);

      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.linearRampToValueAtTime(0.25, now + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);

      osc1.start(now); osc2.start(now); osc3.start(now);
      osc1.stop(now + duration); osc2.stop(now + duration); osc3.stop(now + duration);
    }

    function activate(el) {
      el.classList.add('active');
      setTimeout(() => el.classList.remove('active'), 120);
    }

    function triggerNote(name) {
      const n = noteMap[name];
      const el = document.querySelector(`[data-note="${name}"]`);
      if (!n || !el) return;
      showInfo(n);
      playTone(n.freq);
      activate(el);
    }

    function createKey(name, isBlack) {
      const n = noteMap[name];
      const key = document.createElement('div');
      key.className = isBlack ? 'black-key' : 'white-key';
      key.dataset.note = name;
      key.style.left = (isBlack ? blackLeft[name] : whiteLeft[name]) + 'px';
      key.style.background = n.color;

      const label = document.createElement('div');
      label.className = 'key-label';
      label.style.color = textColor(n.color);
      label.innerHTML = `${name}<br><span class="sub">${n.wavelength.toFixed(0)} nm</span>`;
      key.appendChild(label);

      key.addEventListener('click', (e) => {
        e.stopPropagation();
        triggerNote(name);
      });

      return key;
    }

    whiteOrder.forEach(name => keyboard.appendChild(createKey(name, false)));
    blackOrder.forEach(name => keyboard.appendChild(createKey(name, true)));

    const pressed = new Set();
    window.addEventListener('keydown', (e) => {
      const k = e.key.toLowerCase();
      if (!keyMap[k] || pressed.has(k)) return;
      pressed.add(k);
      triggerNote(keyMap[k]);
    });

    window.addEventListener('keyup', (e) => {
      pressed.delete(e.key.toLowerCase());
    });
  </script>
</body>
</html>
